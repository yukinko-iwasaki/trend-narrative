title: trend-narrative
description: Piecewise-linear trend detection and plain-English narrative generation for time-series data
remote_theme: just-the-docs/just-the-docs@v0.10.1
plugins:
  - jekyll-remote-theme
color_scheme: light
heading_anchors: true
nav_enabled: true
defaults:
  - scope:
      path: ""
    values:
      layout: default
      has_toc: true
aux_links:
  "GitHub":
    - "https://github.com/worldbank/trend-narrative"
exclude:
  - WB-IGO-RIDER.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - CITATION.cff
  - LICENSE
  - pyproject.toml
  - trend_narrative/
  - tests/
